<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--bg-card:#1a1f35;--bg-header:#141829;--border:#252b45;
  --text:#e2e8f0;--text2:#94a3b8;--dim:#64748b;
  --indigo:#818cf8;--blue:#6366f1;--green:#4ade80;--amber:#fbbf24;--red:#f87171;--purple:#a78bfa;
  --safe-top:env(safe-area-inset-top,20px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;
  overscroll-behavior:none;
}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}

/* ---- Header ---- */
.header{
  background:var(--bg-header);
  border-bottom:1px solid rgba(99,102,241,.2);
  padding:16px 20px 14px;text-align:center;
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.header h1{
  font-size:1.25rem;font-weight:800;letter-spacing:-.3px;
  background:linear-gradient(135deg,#818cf8,#6366f1,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.clock{font-size:.82rem;color:var(--text2);margin-top:5px;font-weight:500}
.day-badge{
  display:inline-block;margin-top:7px;padding:3px 12px;border-radius:16px;
  font-size:.68rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
}
.day-badge.weekday{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.day-badge.saturday,.day-badge.sunday{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25)}

/* ---- Tab Bar ---- */
.tabs{
  display:flex;gap:0;margin:16px 16px 0;
  background:var(--bg-card);border-radius:12px;overflow:hidden;
  border:1px solid var(--border);
}
.tab{
  flex:1;padding:11px 0;text-align:center;font-size:.78rem;font-weight:700;
  color:var(--dim);cursor:pointer;transition:all .2s;letter-spacing:.3px;
  border:none;background:none;-webkit-appearance:none;
}
.tab.active{
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:#fff;
}

/* ---- Container ---- */
.container{padding:0 16px 100px}

/* ---- Card ---- */
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;margin-top:14px;overflow:hidden;
}
.card-header{
  padding:14px 16px 12px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.card-icon{
  width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;color:#fff;
}
.card-icon.to-term{background:linear-gradient(135deg,#3b82f6,#6366f1)}
.card-icon.to-acush{background:linear-gradient(135deg,#0d9488,#14b8a6)}
.card-icon.to-mkt{background:linear-gradient(135deg,#10b981,#34d399)}
.card-icon.to-ashley{background:linear-gradient(135deg,#e11d48,#f43f5e)}
.card-icon.to-umass{background:linear-gradient(135deg,#8b5cf6,#a78bfa)}
.card-icon.from-umass{background:linear-gradient(135deg,#f59e0b,#fbbf24)}
.card-icon.to-fr{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
.card-icon.from-fr{background:linear-gradient(135deg,#4f46e5,#6366f1)}
.card-title{font-size:.82rem;font-weight:700;color:var(--text)}
.card-sub{font-size:.68rem;color:var(--dim);margin-top:1px}
.card-body{padding:14px 16px 16px}

.main-label{font-size:.82rem;font-weight:700;color:var(--text2);margin-bottom:2px}
.next-time{font-size:2.2rem;font-weight:800;color:#f8fafc;letter-spacing:-.5px;line-height:1.1}
.countdown{font-size:.9rem;font-weight:700;color:var(--green);margin-top:4px}
.route-badge{
  display:inline-block;margin-top:8px;padding:3px 10px;border-radius:7px;
  font-size:.72rem;font-weight:700;
  background:rgba(99,102,241,.12);color:var(--indigo);
  border:1px solid rgba(99,102,241,.2);
}
.no-bus{color:var(--dim);font-size:.85rem;font-style:italic;padding:16px 0}

/* ---- Upcoming ---- */
.upcoming{border-top:1px solid rgba(255,255,255,.05);margin-top:12px;padding-top:10px}
.upcoming-title{
  font-size:.62rem;font-weight:700;color:var(--dim);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;
}
.up-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 8px;border-radius:8px;margin-bottom:2px;
  background:rgba(255,255,255,.02);
}
.up-time{font-size:.85rem;font-weight:700;color:var(--text)}
.up-route{font-size:.72rem;color:var(--dim);flex:1;text-align:center}
.up-in{font-size:.72rem;color:var(--dim)}

/* ---- Full Schedule ---- */
.schedule-section{margin-top:14px}
.schedule-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;margin-bottom:12px;
}
.schedule-header{
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;-webkit-user-select:none;user-select:none;
}
.schedule-header h3{font-size:.82rem;font-weight:700;color:var(--text)}
.schedule-header .arrow{
  font-size:.7rem;color:var(--dim);transition:transform .2s;
}
.schedule-header .arrow.open{transform:rotate(180deg)}
.schedule-body{display:none;padding:0 16px 12px}
.schedule-body.open{display:block}
.sched-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);
}
.sched-row:last-child{border-bottom:none}
.sched-row .time{font-size:.8rem;font-weight:600;color:var(--text)}
.sched-row .route{font-size:.72rem;color:var(--dim)}
.sched-row.past{opacity:.35}
.sched-row.next-bus-row{
  background:rgba(99,102,241,.08);border-radius:6px;padding:5px 8px;
  border-bottom:none;margin:2px -8px;
}
.sched-row.next-bus-row .time{color:var(--indigo)}

/* ---- Pulse animation for countdown ---- */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.countdown{animation:pulse 2s ease-in-out infinite}

/* ---- Dark scrollbar ---- */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<div class="header">
  <h1>🚌 SRTA Bus</h1>
  <div class="clock" id="clock"></div>

</div>

<div class="tabs">
  <button class="tab active" data-tab="next" id="tabNext">Next Bus</button>
  <button class="tab" data-tab="schedule" id="tabSchedule">Full Schedule</button>
</div>

<div class="container" id="nextView">
  <div class="card" id="card-terminal"></div>

</div>

<div class="container" id="scheduleView" style="display:none"></div>

<script>
// ============================================================
// SCHEDULE DATA
// ============================================================
const LEAD=5;
function p(s){const[t,m]=s.split(':');const[mn,ap]=m.split(' ');let h=parseInt(t);const mi=parseInt(mn);if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+mi}

const R202_IN_WD=["6:18 AM","6:42 AM","7:10 AM","7:35 AM","7:55 AM","8:15 AM","8:35 AM","8:55 AM","9:17 AM","9:39 AM","9:59 AM","10:19 AM","10:39 AM","10:59 AM","11:19 AM","11:39 AM","11:59 AM","12:19 PM","12:39 PM","12:59 PM","1:19 PM","1:39 PM","1:59 PM","2:19 PM","2:39 PM","2:59 PM","3:19 PM","3:39 PM","3:59 PM","4:19 PM","4:39 PM","4:59 PM","5:19 PM","5:39 PM","5:59 PM","6:17 PM","6:37 PM","6:57 PM","7:27 PM","7:57 PM","8:27 PM","8:57 PM","9:27 PM"];

const R211_IN_WD=["6:59 AM","7:29 AM","7:59 AM","8:29 AM","8:59 AM","9:29 AM","9:59 AM","10:29 AM","10:59 AM","11:29 AM","11:59 AM","12:29 PM","12:59 PM","1:29 PM","1:59 PM","2:29 PM","2:59 PM","3:29 PM","3:59 PM","4:29 PM","4:59 PM","5:29 PM","5:59 PM","6:29 PM"];
const R211_IN_SAT=["8:54 AM","9:24 AM","9:54 AM","10:24 AM","10:54 AM","11:24 AM","11:54 AM","12:24 PM","12:54 PM","1:24 PM","1:54 PM","2:24 PM","2:54 PM","3:24 PM","3:54 PM","4:24 PM","4:54 PM","5:24 PM"];

const R202_OUT_WD_DEP=["6:05 AM","6:30 AM","6:55 AM","7:15 AM","7:35 AM","7:55 AM","8:15 AM","8:35 AM","8:55 AM","9:15 AM","9:35 AM","9:55 AM","10:15 AM","10:35 AM","10:55 AM","11:15 AM","11:35 AM","11:55 AM","12:15 PM","12:35 PM","12:55 PM","1:15 PM","1:35 PM","1:55 PM","2:15 PM","2:35 PM","2:55 PM","3:15 PM","3:35 PM","3:55 PM","4:15 PM","4:35 PM","4:55 PM","5:15 PM","5:35 PM","5:55 PM","6:20 PM","6:50 PM","7:20 PM","7:50 PM","8:20 PM","8:50 PM","9:20 PM"];
const R211_OUT_WD_DEP=["6:05 AM","6:35 AM","7:05 AM","7:35 AM","8:05 AM","8:35 AM","9:05 AM","9:35 AM","10:05 AM","10:35 AM","11:05 AM","11:35 AM","12:05 PM","12:35 PM","1:05 PM","1:35 PM","2:05 PM","2:35 PM","3:05 PM","3:35 PM","4:05 PM","4:35 PM","5:05 PM","5:35 PM"];
const R202_OUT_SAT_DEP=["6:55 AM","7:25 AM","7:55 AM","8:25 AM","8:55 AM","9:25 AM","9:55 AM","10:25 AM","10:55 AM","11:25 AM","11:55 AM","12:25 PM","12:55 PM","1:25 PM","1:55 PM","2:25 PM","2:55 PM","3:25 PM","3:55 PM","4:25 PM","4:55 PM","5:25 PM","5:55 PM"];
const R211_OUT_SAT_DEP=["8:05 AM","8:35 AM","9:05 AM","9:35 AM","10:05 AM","10:35 AM","11:05 AM","11:35 AM","12:05 PM","12:35 PM","1:05 PM","1:35 PM","2:05 PM","2:35 PM","3:05 PM","3:35 PM","4:05 PM","4:35 PM"];

const R09_OUT_WD_DEP=["6:05 AM", "7:00 AM", "8:00 AM", "9:00 AM", "9:30 AM", "10:00 AM", "10:30 AM", "11:00 AM", "11:30 AM", "12:00 PM", "12:30 PM", "1:00 PM", "1:30 PM", "2:00 PM", "2:30 PM", "3:00 PM", "3:30 PM", "4:00 PM", "4:30 PM", "5:00 PM", "6:00 PM", "7:00 PM", "8:00 PM"];
const R09_OUT_SAT_DEP=["8:00 AM", "9:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "1:00 PM", "2:00 PM", "3:00 PM", "4:00 PM", "5:00 PM", "6:00 PM"];
const R09_IN_WD_DEP=["7:34 AM", "8:34 AM", "9:34 AM", "10:34 AM", "11:04 AM", "11:34 AM", "12:04 PM", "12:34 PM", "1:04 PM", "1:34 PM", "2:04 PM", "2:34 PM", "3:04 PM", "3:34 PM", "4:04 PM", "4:34 PM", "5:04 PM", "5:34 PM", "6:04 PM", "6:34 PM", "7:34 PM", "8:34 PM", "9:34 PM"];
const R09_IN_SAT_DEP=["9:34 AM", "10:34 AM", "11:34 AM", "12:34 PM", "1:34 PM", "2:34 PM", "3:34 PM", "4:34 PM", "5:34 PM", "6:34 PM", "7:34 PM"];

const R204_HOLLY_IN_WD=["6:32 AM","6:57 AM","7:19 AM","7:43 AM","8:09 AM","8:39 AM","9:09 AM","9:39 AM","10:09 AM","10:39 AM","11:09 AM","11:39 AM","12:09 PM","12:39 PM","1:09 PM","1:39 PM","2:09 PM","2:34 PM","3:09 PM","3:39 PM","4:09 PM","4:23 PM","4:39 PM","5:09 PM","5:39 PM","6:09 PM","6:39 PM","7:09 PM","7:39 PM","8:09 PM","8:39 PM"];
const R204_HOLLY_IN_SAT=["8:14 AM","8:44 AM","9:14 AM","9:44 AM","10:14 AM","10:44 AM","11:14 AM","11:44 AM","12:14 PM","12:44 PM","1:14 PM","1:44 PM","2:14 PM","2:44 PM","3:14 PM","3:44 PM","4:14 PM","4:44 PM","5:14 PM","5:44 PM"];
const R204_DANIEL_IN_WD=["6:39 AM","7:04 AM","7:26 AM","7:50 AM","8:16 AM","8:46 AM","9:16 AM","9:46 AM","10:16 AM","10:46 AM","11:16 AM","11:46 AM","12:16 PM","12:46 PM","1:16 PM","1:46 PM","2:19 PM","2:44 PM","3:19 PM","3:49 PM","4:19 PM","4:33 PM","4:49 PM","5:19 PM","5:49 PM","6:16 PM","6:46 PM","7:16 PM","7:46 PM","8:16 PM","8:46 PM"];
const R204_DANIEL_IN_SAT=["8:21 AM","8:51 AM","9:21 AM","9:51 AM","10:21 AM","10:51 AM","11:21 AM","11:51 AM","12:21 PM","12:51 PM","1:21 PM","1:51 PM","2:21 PM","2:51 PM","3:21 PM","3:51 PM","4:21 PM","4:51 PM","5:21 PM","5:51 PM"];
const R204_TERM_OUT_WD=["5:35 AM","6:00 AM","6:50 AM","7:15 AM","7:40 AM","8:10 AM","8:40 AM","9:10 AM","9:40 AM","10:10 AM","10:40 AM","11:10 AM","11:40 AM","12:10 PM","12:40 PM","1:10 PM","1:40 PM","2:07 PM","2:40 PM","3:10 PM","3:40 PM","4:10 PM","4:40 PM","5:10 PM","5:40 PM","6:10 PM","6:40 PM","7:10 PM","7:40 PM","8:10 PM"];
const R204_TERM_OUT_SAT=["7:45 AM","8:15 AM","8:45 AM","9:15 AM","9:45 AM","10:15 AM","10:45 AM","11:15 AM","11:45 AM","12:15 PM","12:45 PM","1:15 PM","1:45 PM","2:15 PM","2:45 PM","3:15 PM","3:45 PM","4:15 PM","4:45 PM","5:15 PM"];

const R9X_OUT_WD_DEP=["6:15 AM","7:15 AM","8:15 AM","9:15 AM","10:15 AM","11:15 AM","12:15 PM","1:15 PM","2:15 PM","3:15 PM","4:15 PM","5:15 PM","6:15 PM","7:15 PM","8:15 PM","9:15 PM"];
const R9X_OUT_SAT_DEP=["8:15 AM","9:15 AM","10:15 AM","11:15 AM","12:15 PM","1:15 PM","2:15 PM","3:15 PM","4:15 PM","5:15 PM","6:15 PM","7:15 PM"];
const R9X_IN_WD_DEP=["6:45 AM","7:45 AM","8:45 AM","9:45 AM","10:45 AM","11:45 AM","12:45 PM","1:45 PM","2:45 PM","3:45 PM","4:45 PM","5:45 PM","6:45 PM","7:45 PM","8:45 PM","9:45 PM"];
const R9X_IN_SAT_DEP=["8:45 AM","9:45 AM","10:45 AM","11:45 AM","12:45 PM","1:45 PM","2:45 PM","3:45 PM","4:45 PM","5:45 PM","6:45 PM","7:45 PM"];

// ============================================================
// HELPERS
// ============================================================
function nowMins(){const d=new Date();return d.getHours()*60+d.getMinutes()}
function getDayType(){const d=new Date().getDay();if(d===0)return'sunday';if(d===6)return'saturday';return'weekday'}
function isWeekend(){const dt=getDayType();return dt==='saturday'||dt==='sunday'}
function fmtMins(m){let h=Math.floor(m/60),mi=m%60;const ap=h>=12?'PM':'AM';if(h>12)h-=12;if(h===0)h=12;return h+':'+String(mi).padStart(2,'0')+' '+ap}

function findNext(mode){
  const dt=getDayType(),nowM=nowMins();
  const isSat=isWeekend();
  let all=[];

  if(mode==='terminal'){
    const d202=isSat?R202_IN_SAT:R202_IN_WD;
    for(const t of d202){const m=p(t)-LEAD;if(m>=nowM)all.push({route:"202 Lund's Corner",routeNum:202,dep:m,depStr:fmtMins(m)})}
    const d204h=isSat?R204_HOLLY_IN_SAT:R204_HOLLY_IN_WD;
    for(const t of d204h){const m=p(t);if(m>=nowM)all.push({route:'204 Ashley & Holly',routeNum:204,dep:m,depStr:t})}
    const d204d=isSat?R204_DANIEL_IN_SAT:R204_DANIEL_IN_WD;
    for(const t of d204d){const m=p(t);if(m>=nowM)all.push({route:'204 Ashley & Daniel',routeNum:204,dep:m,depStr:t})}
  } else if (mode==='acushnet') {
    const d211=isSat?R211_IN_SAT:R211_IN_WD;
    for(const t of d211){const m=p(t)-LEAD;if(m>=nowM)all.push({route:'211 Fairhaven',routeNum:211,dep:m,depStr:fmtMins(m)})}
  } else if (mode==='market') {
    const d202=isSat?R202_OUT_SAT_DEP:R202_OUT_WD_DEP;
    const d211=isSat?R211_OUT_SAT_DEP:R211_OUT_WD_DEP;
    for(const t of d202){const m=p(t);if(m>=nowM)all.push({route:"202 Lund's Corner",routeNum:202,dep:m,depStr:t})}
    for(const t of d211){const m=p(t);if(m>=nowM)all.push({route:'211 Fairhaven',routeNum:211,dep:m,depStr:t})}
  } else if (mode==='term2ashley') {
    const d204=isSat?R204_TERM_OUT_SAT:R204_TERM_OUT_WD;
    for(const t of d204){const m=p(t);if(m>=nowM)all.push({route:'Route 204',dep:m,depStr:t})}
  } else if (mode==='term2umass') {
    const d09=isSat?R09_OUT_SAT_DEP:R09_OUT_WD_DEP;
    for(const t of d09){const m=p(t);if(m>=nowM)all.push({route:'Route 9',dep:m,depStr:t})}
  } else if (mode==='umass2term') {
    const d09=isSat?R09_IN_SAT_DEP:R09_IN_WD_DEP;
    for(const t of d09){const m=p(t);if(m>=nowM)all.push({route:'Route 9',dep:m,depStr:t})}
  } else if (mode==='term2fr') {
    const d9x=isSat?R9X_OUT_SAT_DEP:R9X_OUT_WD_DEP;
    for(const t of d9x){const m=p(t);if(m>=nowM)all.push({route:'Route 9x',dep:m,depStr:t})}
  } else if (mode==='fr2term') {
    const d9x=isSat?R9X_IN_SAT_DEP:R9X_IN_WD_DEP;
    for(const t of d9x){const m=p(t);if(m>=nowM)all.push({route:'Route 9x',dep:m,depStr:t})}
  }
  all.sort((a,b)=>a.dep-b.dep);
  return{day:dt,buses:all};
}

function getAllTimes(mode){
  const dt=getDayType();
  const isSat=isWeekend();
  let all=[];
  if(mode==='terminal'){
    const d202=isSat?R202_IN_SAT:R202_IN_WD;
    for(const t of d202){const m=p(t)-LEAD;all.push({route:"202 Lund's Corner",routeNum:202,dep:m,depStr:fmtMins(m)})}
    const d204h=isSat?R204_HOLLY_IN_SAT:R204_HOLLY_IN_WD;
    for(const t of d204h)all.push({route:'204 Ashley & Holly',routeNum:204,dep:p(t),depStr:t});
    const d204d=isSat?R204_DANIEL_IN_SAT:R204_DANIEL_IN_WD;
    for(const t of d204d)all.push({route:'204 Ashley & Daniel',routeNum:204,dep:p(t),depStr:t});
  } else if (mode==='acushnet') {
    const d211=isSat?R211_IN_SAT:R211_IN_WD;
    for(const t of d211){const m=p(t)-LEAD;all.push({route:'211 Fairhaven',routeNum:211,dep:m,depStr:fmtMins(m)})}
  } else if (mode==='market') {
    const d202=isSat?R202_OUT_SAT_DEP:R202_OUT_WD_DEP;
    const d211=isSat?R211_OUT_SAT_DEP:R211_OUT_WD_DEP;
    for(const t of d202)all.push({route:"202 Lund's Corner",routeNum:202,dep:p(t),depStr:t});
    for(const t of d211)all.push({route:'211 Fairhaven',routeNum:211,dep:p(t),depStr:t});
  } else if (mode==='term2ashley') {
    const d204=isSat?R204_TERM_OUT_SAT:R204_TERM_OUT_WD;
    for(const t of d204)all.push({route:'Route 204',dep:p(t),depStr:t});
  } else if (mode==='term2umass') {
    const d09=isSat?R09_OUT_SAT_DEP:R09_OUT_WD_DEP;
    for(const t of d09)all.push({route:'Route 9',dep:p(t),depStr:t});
  } else if (mode==='umass2term') {
    const d09=isSat?R09_IN_SAT_DEP:R09_IN_WD_DEP;
    for(const t of d09)all.push({route:'Route 9',dep:p(t),depStr:t});
  } else if (mode==='term2fr') {
    const d9x=isSat?R9X_OUT_SAT_DEP:R9X_OUT_WD_DEP;
    for(const t of d9x)all.push({route:'Route 9x',dep:p(t),depStr:t});
  } else if (mode==='fr2term') {
    const d9x=isSat?R9X_IN_SAT_DEP:R9X_IN_WD_DEP;
    for(const t of d9x)all.push({route:'Route 9x',dep:p(t),depStr:t});
  }
  all.sort((a,b)=>a.dep-b.dep);
  return all;
}

// ============================================================
// CARD CONFIGS
// ============================================================
const CARDS=[
  {id:'card-terminal',mode:'terminal',icon:'➜',iconCls:'to-term',
   title:'Purchase St → Terminal',sub:'Routes 202 & 204',
   labelFn:(nxt)=>'Bus leaves '+nxt.route+':'},
  {id:'card-acushnet',mode:'acushnet',icon:'➜',iconCls:'to-acush',
   title:'Acushnet Ave → Terminal',sub:'Route 211 • Fairhaven',
   labelFn:()=>'Bus leaves Market Basket:'},
  {id:'card-market',mode:'market',icon:'🛒',iconCls:'to-mkt',
   title:'Terminal → Market Basket',sub:'Routes 202 & 211',
   labelFn:(nxt)=>'Bus leaves Terminal ('+nxt.route+'):'},
  {id:'card-term2ashley',mode:'term2ashley',icon:'🏪',iconCls:'to-ashley',
   title:'Terminal → Ashley',sub:'Route 204',
   labelFn:()=>'Bus leaves Terminal:'},
  {id:'card-term2umass',mode:'term2umass',icon:'🎓',iconCls:'to-umass',
   title:'Terminal → UMass',sub:'Route 9',
   labelFn:()=>'Bus leaves Terminal for UMass:'},
  {id:'card-umass2term',mode:'umass2term',icon:'🚌',iconCls:'from-umass',
   title:'UMass → Terminal',sub:'Route 9',
   labelFn:()=>'Bus leaves UMass for Terminal:'},
  {id:'card-term2fr',mode:'term2fr',icon:'🌉',iconCls:'to-fr',
   title:'Terminal → Fall River',sub:'Route 9x Express',
   labelFn:()=>'Bus leaves Terminal:'},
  {id:'card-fr2term',mode:'fr2term',icon:'🌉',iconCls:'from-fr',
   title:'Fall River → Terminal',sub:'Route 9x Express',
   labelFn:()=>'Bus leaves Fall River:'}
];

function renderCard(cfg){
  const el=document.getElementById(cfg.id);
  const {day,buses}=findNext(cfg.mode);
  const nowM=nowMins();

  let html=`<div class="card-header">
    <div class="card-icon ${cfg.iconCls}">${cfg.icon}</div>
    <div><div class="card-title">${cfg.title}</div><div class="card-sub">${cfg.sub}</div></div>
  </div><div class="card-body">`;

  if(!buses.length){
    html+=`<div class="no-bus">No more buses today</div>`;
  } else {
    const nxt=buses[0];
    const minsLeft=nxt.dep-nowM;

    html+=`<div class="main-label">${cfg.labelFn(nxt)}</div>`;
    html+=`<div class="next-time">${nxt.depStr}</div>`;
    html+=`<div class="countdown">in ${minsLeft} min${minsLeft!==1?'s':''}</div>`;
    html+=`<span class="route-badge">${nxt.route}</span>`;

    if(buses.length>1){
      html+=`<div class="upcoming"><div class="upcoming-title">Coming up</div>`;
      for(let i=1;i<Math.min(5,buses.length);i++){
        const b=buses[i];
        const m=b.dep-nowM;
        html+=`<div class="up-row">
          <span class="up-time">${b.depStr}</span>
          <span class="up-route">${b.route}</span>
          <span class="up-in">${m} min</span>
        </div>`;
      }
      html+=`</div>`;
    }
  }
  html+=`</div>`;
  el.innerHTML=html;
}

// ============================================================
// FULL SCHEDULE VIEW
// ============================================================
function renderSchedule(){
  const sv=document.getElementById('scheduleView');
  const dt=getDayType();
  const nowM=nowMins();

  const sections=[
    {mode:'terminal',title:'Purchase St → Terminal',label:'Routes 202 & 204'},
    {mode:'acushnet',title:'Acushnet Ave → Terminal',label:'Route 211'},
    {mode:'market',title:'Terminal → Market Basket',label:'Routes 202 & 211'},
    {mode:'term2ashley',title:'Terminal → Ashley',label:'Route 204'},
    {mode:'term2umass',title:'Terminal → UMass',label:'Route 9'},
    {mode:'umass2term',title:'UMass → Terminal',label:'Route 9'},
    {mode:'term2fr',title:'Terminal → Fall River',label:'Route 9x'},
    {mode:'fr2term',title:'Fall River → Terminal',label:'Route 9x'},
  ];

  let html='';
  for(const sec of sections){
    const times=getAllTimes(sec.mode);
    let firstNext=true;
    html+=`<div class="schedule-card">
      <div class="schedule-header" onclick="this.querySelector('.arrow').classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <h3>${sec.title}</h3><span class="arrow">▼</span>
      </div>
      <div class="schedule-body">`;
    for(const t of times){
      const isPast=t.dep<nowM;
      const isNext=!isPast&&firstNext;
      if(isNext)firstNext=false;
      const cls=isPast?'sched-row past':isNext?'sched-row next-bus-row':'sched-row';
      html+=`<div class="${cls}">
        <span class="time">${t.depStr}</span>
        <span class="route">${t.route}</span>
      </div>`;
    }
    html+=`</div></div>`;
  }
  sv.innerHTML=html;
}

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const which=tab.dataset.tab;
    document.getElementById('nextView').style.display=which==='next'?'':'none';
    document.getElementById('scheduleView').style.display=which==='schedule'?'':'none';
    if(which==='schedule')renderSchedule();
  });
});

// ============================================================
// CLOCK & UPDATE
// ============================================================
function updateClock(){
  const d=new Date();
  document.getElementById('clock').textContent=d.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
  const dt=getDayType();
  const badge=document.getElementById('dayBadge');
  badge.className='day-badge '+dt;
  badge.textContent=dt==='weekday'?'Weekday Schedule':'Weekend Schedule';
}

function update(){
  updateClock();
  CARDS.forEach(renderCard);
}

update();
setInterval(update,15000);

// Vibrate on tap for haptic feel (if supported)
document.addEventListener('click',()=>{if(navigator.vibrate)navigator.vibrate(10)});
</script>
